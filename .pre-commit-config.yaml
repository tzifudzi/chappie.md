# pre-commit hook configuration
# Install: pip install pre-commit && pre-commit install
# Note: .yaml extension required by pre-commit framework (cannot use .yml)
repos:
  - repo: local
    hooks:
      # Markdown formatting via Makefile
      - id: md-fmt
        name: "Markdown format check"
        entry: make md-fmt-check
        language: system
        pass_filenames: false
        files: \.md$
